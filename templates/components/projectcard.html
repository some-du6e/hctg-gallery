{% macro projectCard(project) %}
<a
  href="/project/{{ project.id }}"
  target="_blank"
  rel="noopener noreferrer"
  {% if project.high_quality %}
  class="group relative flex h-full cursor-pointer flex-col overflow-hidden rounded-2xl transition-transform hover:scale-[1.02] shadow-[0_0_30px_rgba(255,215,0,0.9)]"
  {% else %}
  class="group relative flex h-full cursor-pointer flex-col overflow-hidden rounded-2xl transition-transform hover:scale-[1.02] false "
  {% endif %}
  hctg-public-project-id="{{project.id}}">
  <div class="relative overflow-hidden rounded-t-2xl">
    <img
      alt="{{project.title}}"
      class="h-[105px] w-full rounded-tl-2xl rounded-tr-2xl border-2 border-b-0 border-black object-cover"
      src="{{ project.screenshot }}"
      title="" />
  </div>
  <div class="flex-1 rounded-br-2xl rounded-bl-2xl border-2 border-black bg-white p-6">
    <div class="flex items-start justify-between gap-2">
      <h2 class="smoothing-black text-4xl font-bold tracking-[-0.03em] wrap-anywhere">{{project.title}}</h2>
      <div class="flex shrink-0 items-center gap-1.5">
        <img
          alt="Clock"
          class="h-5 w-5"
          src="data:image/svg+xml,%3csvg%20width='100%25'%20height='100%25'%20overflow='visible'%20style='display:%20block;'%20viewBox='0%200%2016%2016'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20id='Clock%20Icon'%20d='M8%200C12.4184%200%2016%203.5816%2016%208C16%2012.4184%2012.4184%2016%208%2016C3.5816%2016%200%2012.4184%200%208C0%203.5816%203.5816%200%208%200ZM8%203.2C7.78783%203.2%207.58434%203.28429%207.43431%203.43431C7.28429%203.58434%207.2%203.78783%207.2%204V8C7.20005%208.21216%207.28436%208.41561%207.4344%208.5656L9.8344%2010.9656C9.98528%2011.1113%2010.1874%2011.192%2010.3971%2011.1901C10.6069%2011.1883%2010.8075%2011.1042%2010.9559%2010.9559C11.1042%2010.8075%2011.1883%2010.6069%2011.1901%2010.3971C11.192%2010.1874%2011.1113%209.98528%2010.9656%209.8344L8.8%207.6688V4C8.8%203.78783%208.71571%203.58434%208.56569%203.43431C8.41566%203.28429%208.21217%203.2%208%203.2Z'%20fill='var(--fill-0,%20black)'/%3e%3c/svg%3e" />
        <span class="smoothing-black text-2xl tracking-[-0.03em]">13h 31mTODO</span>
      </div>
    </div>
    <p class="smoothing-gray text-xl text-gray-600">by {{project.username}}</p>
    <p
      class="smoothing-black mt-2 max-h-14 overflow-hidden text-xl tracking-[-0.02em] wrap-break-word text-ellipsis">
      {{project.desc}}
    </p>
    {% if project.high_quality %}
    <p class="pt-2 text-center font-semibold text-yellow-600 italic">🎫 Golden ticket winner!</p>
    {% endif %}
  </div>
</a>
{% endmacro %}
